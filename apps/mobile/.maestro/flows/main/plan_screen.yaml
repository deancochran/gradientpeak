# Main Test: Verify Plan Screen after Login
appId: com.deancochran.gradientpeak.dev
---
- runFlow:
    file: ../reusable/bootstrap.yaml
- runFlow:
    file: ../reusable/login.yaml
    env:
      email: "${STANDARD_USER_EMAIL}"
      password: "${STANDARD_USER_PASS}"
- tapOn: "Plan"
- extendedWaitUntil:
    visible: "Forecasted Projection"
    timeout: 10000
- takeScreenshot: reports/plan_screen_after_login.png
