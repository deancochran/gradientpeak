# Main Test: Verify Profile Screen after Login
appId: com.deancochran.gradientpeak.dev
env:
  TARGET_USERNAME: "coachcasey"
  TARGET_USER_ID: "2f3c344a-a44d-4541-8833-3b52bcefb130"
---
- runFlow:
    file: ../reusable/bootstrap.yaml
- runFlow:
    file: ../reusable/login.yaml
    env:
      email: "${STANDARD_USER_EMAIL}"
      password: "${STANDARD_USER_PASS}"
- tapOn:
    id: "search-header-button"
- extendedWaitUntil:
    visible:
      id: "discover-screen"
    timeout: 10000
- tapOn:
    id: "discover-scope-users"
- tapOn:
    id: "discover-search-input"
- inputText: "${TARGET_USERNAME}"
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "discover-user-${TARGET_USER_ID}"
    timeout: 10000
- tapOn:
    id: "discover-user-${TARGET_USER_ID}"
- extendedWaitUntil:
    visible:
      id: "user-detail-screen"
    timeout: 10000
- takeScreenshot: reports/profile_screen_after_login.png
