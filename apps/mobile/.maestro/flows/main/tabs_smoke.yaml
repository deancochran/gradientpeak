appId: com.deancochran.gradientpeak.dev
env:
  USER_EMAIL: "test@example.com"
  USER_PASS: "password123"
---
- runFlow:
    file: ../reusable/bootstrap.yaml
- runFlow:
    file: ../reusable/login.yaml
    env:
      email: "${USER_EMAIL}"
      password: "${USER_PASS}"
- assertVisible: "Home"
- assertVisible: "Discover"
- assertVisible: "Record"
- assertVisible: "Plan"
- assertVisible: "Calendar"
- tapOn: "Discover"
- extendedWaitUntil:
    visible: "Activity Plans"
    timeout: 10000
- tapOn: "Plan"
- extendedWaitUntil:
    visible: "Forecasted Projection"
    timeout: 10000
- tapOn: "Calendar"
- extendedWaitUntil:
    visible:
      id: "create-event-entry"
    timeout: 10000
- tapOn: "Record"
- extendedWaitUntil:
    visible:
      id: "activity-selection-modal"
    timeout: 10000
- tapOn:
    id: "activity-select-run"
- extendedWaitUntil:
    visible:
      id: "recording-start-button"
    timeout: 10000
