appId: com.deancochran.gradientpeak.dev
env:
  RESET_EMAIL: "test@example.com"
---
- runFlow:
    file: ../reusable/bootstrap.yaml
- assertVisible:
    id: "sign-in-screen"
- assertVisible:
    id: "sign-in-screen"
- tapOn:
    id: "forgot-password-button"
- assertVisible:
    id: "forgot-password-screen"
- tapOn: "Email address"
- inputText: "${RESET_EMAIL}"
- hideKeyboard
- tapOn:
    id: "send-reset-button"
- extendedWaitUntil:
    visible:
      id: "reset-email-sent-screen"
    timeout: 15000
- tapOn:
    id: "back-to-signin-button"
- assertVisible:
    id: "sign-in-screen"
