appId: com.deancochran.gradientpeak.dev
---
- runFlow:
    file: ../reusable/bootstrap.yaml
- runFlow:
    file: ../reusable/login.yaml
    env:
      email: "${ONBOARDING_USER_EMAIL}"
      password: "${ONBOARDING_USER_PASS}"
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 15000
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-experience-beginner"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-gender-male"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-dob"
- inputText: "1990-01-01"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-weight"
- inputText: "72"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-sport-other"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-next-button"
- extendedWaitUntil:
    visible: "All Set!"
    timeout: 10000
- tapOn:
    id: "onboarding-finish-button"
- extendedWaitUntil:
    visible: "Plan"
    timeout: 15000
