appId: com.deancochran.gradientpeak.dev
---
- runFlow:
    file: ../reusable/bootstrap.yaml
- runFlow:
    when:
      visible:
        id: "verify-screen"
    commands:
      - tapOn:
          id: "back-to-sign-in-button"
- runFlow:
    when:
      visible:
        id: "search-header-button"
    commands:
      - tapOn:
          id: "app-header-avatar-button"
      - extendedWaitUntil:
          visible:
            id: "user-detail-screen"
          timeout: 10000
      - tapOn:
          id: "sign-out"
      - tapOn:
          text: "Sign Out"
          optional: true
      - extendedWaitUntil:
          visible:
            id: "sign-in-screen"
          timeout: 10000
- tapOn:
    id: "login-button"
    optional: true
- runFlow:
    when:
      visible:
        id: "sign-in-screen"
    commands:
      - tapOn:
          id: "email-input"
      - inputText: "${ONBOARDING_USER_EMAIL}"
      - tapOn:
          id: "password-input"
      - inputText: "${ONBOARDING_USER_PASS}"
      - hideKeyboard
      - tapOn:
          id: "sign-in-button"
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 15000
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-experience-beginner"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-gender-male"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-skip-button"
- tapOn:
    text: "Current weight"
- inputText: "72"
- hideKeyboard
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-sport-other"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-next-button"
- extendedWaitUntil:
    visible: "All Set!"
    timeout: 10000
- tapOn:
    id: "onboarding-finish-button"
- tapOn:
    id: "onboarding-status-confirm"
    optional: true
- extendedWaitUntil:
    visible:
      id: "search-header-button"
    timeout: 15000
