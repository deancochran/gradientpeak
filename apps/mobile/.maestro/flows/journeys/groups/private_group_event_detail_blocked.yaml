appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  PRIVATE_GROUP_EVENT_ID: "00000000-0000-4000-8000-000000000000"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- openLink: "gradientpeak://group-event-detail?groupEventId=${PRIVATE_GROUP_EVENT_ID}"
- extendedWaitUntil:
    visible: "Unable to load event"
    timeout: 10000
- assertVisible: "This group event may be unavailable."
- assertNotVisible: "Edit event"
- assertNotVisible: "RSVP"
