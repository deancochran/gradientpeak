appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  GROUP_EVENT_TITLE: "Saturday Ride"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- runFlow:
    file: ../../reusable/open_groups_tab.yaml
- extendedWaitUntil:
    visible: "Upcoming group events"
    timeout: 10000
- tapOn: "${GROUP_EVENT_TITLE}"
- extendedWaitUntil:
    visible:
      id: "group-event-detail-screen"
    timeout: 10000
- assertVisible: "${GROUP_EVENT_TITLE}"
- assertVisible: "Series RSVP"
- assertVisible: "Future dates"
- assertNotVisible: "Unable to load event"
- tapOn: "Going to series"
- assertNotVisible: "Unable to RSVP to series"
- tapOn: "Going"
- assertNotVisible: "Unable to RSVP"
- runFlow:
    file: ../../reusable/assert_runtime_errors_clear.yaml
