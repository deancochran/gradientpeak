appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  INACCESSIBLE_EVENT_ID: "00000000-0000-4000-8000-000000000000"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- openLink: "gradientpeak://event-detail?id=${INACCESSIBLE_EVENT_ID}"
- extendedWaitUntil:
    visible:
      id: "calendar-screen-ready"
    timeout: 10000
- assertVisible:
    id: "create-event-entry"
- assertNotVisible:
    id: "event-detail-options-trigger"
- assertNotVisible: "Attach Activity Plan"
