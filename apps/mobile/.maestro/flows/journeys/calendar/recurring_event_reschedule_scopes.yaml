appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  SCHEDULED_EVENT_TITLE: "Long Run"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- runFlow:
    file: ../../reusable/open_calendar_tab.yaml
- tapOn: "${SCHEDULED_EVENT_TITLE}"
- extendedWaitUntil:
    visible:
      id: "event-detail-options-trigger"
    timeout: 10000
- tapOn:
    id: "event-detail-options-trigger"
- tapOn:
    id: "event-detail-options-edit"
- extendedWaitUntil:
    visible:
      id: "event-detail-update-save-button"
    timeout: 10000
- assertVisible:
    id: "event-detail-update-repeat-row"
- assertVisible:
    id: "event-detail-update-save-button"
- tapOn:
    id: "event-detail-update-save-button"
- assertVisible: "Recurring Event"
- assertVisible: "This event only"
- assertVisible: "This and future events"
- assertVisible: "Entire series"
- tapOn:
    id: "event-detail-update-scope-single"
