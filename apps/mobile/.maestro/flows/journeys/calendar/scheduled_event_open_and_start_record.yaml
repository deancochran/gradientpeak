appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  SCHEDULED_EVENT_TITLE: "Long Run"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- runFlow:
    file: ../../reusable/open_calendar_tab.yaml
- tapOn: "${SCHEDULED_EVENT_TITLE}"
- extendedWaitUntil:
    visible:
      id: "event-detail-activity-plan-card"
    timeout: 10000
- tapOn:
    id: "event-detail-activity-plan-card"
- extendedWaitUntil:
    visible:
      id: "activity-plan-options-trigger"
    timeout: 10000
- tapOn:
    id: "activity-plan-options-trigger"
- tapOn:
    id: "activity-plan-options-start"
- extendedWaitUntil:
    visible:
      id: "record-screen-ready"
    timeout: 10000
- assertVisible:
    id: "recording-start-button"
