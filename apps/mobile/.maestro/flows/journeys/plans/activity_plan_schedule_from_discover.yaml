appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  SHARED_ACTIVITY_PLAN_NAME: "Tempo Builder"
---
- runFlow:
    file: ./activity_detail_open.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
      SHARED_ACTIVITY_PLAN_NAME: "${SHARED_ACTIVITY_PLAN_NAME}"
- tapOn:
    id: "activity-plan-options-duplicate"
    optional: true
- tapOn:
    id: "activity-plan-options-schedule"
- extendedWaitUntil:
    visible:
      id: "schedule-modal"
    timeout: 10000
- tapOn:
    id: "schedule-submit-button"
- extendedWaitUntil:
    visible:
      id: "activity-plan-options-trigger"
    timeout: 10000
- tapOn:
    id: "activity-plan-options-trigger"
- assertVisible:
    id: "activity-plan-options-remove-schedule"
