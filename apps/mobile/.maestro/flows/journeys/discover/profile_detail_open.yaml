appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  TARGET_USERNAME: "coachcasey"
  TARGET_USER_ID: "2f3c344a-a44d-4541-8833-3b52bcefb130"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- tapOn:
    id: "search-header-button"
- extendedWaitUntil:
    visible:
      id: "discover-screen"
    timeout: 10000
- tapOn:
    id: "discover-scope-users"
- tapOn:
    id: "discover-search-input"
- inputText: "${TARGET_USERNAME}"
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "discover-user-${TARGET_USER_ID}"
    timeout: 10000
- tapOn:
    id: "discover-user-${TARGET_USER_ID}"
- extendedWaitUntil:
    visible:
      id: "user-detail-screen"
    timeout: 10000
