appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  SHARED_ROUTE_NAME: "River Loop"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- runFlow:
    file: ../../reusable/open_discover_tab.yaml
- tapOn:
    id: "discover-tab-routes"
- tapOn:
    id: "discover-search-input"
- inputText: "${SHARED_ROUTE_NAME}"
- extendedWaitUntil:
    visible: "${SHARED_ROUTE_NAME}"
    timeout: 10000
- tapOn: "${SHARED_ROUTE_NAME}"
- extendedWaitUntil:
    visible:
      id: "route-detail-screen"
    timeout: 10000
- assertVisible:
    id: "route-detail-like-button"
    optional: true
