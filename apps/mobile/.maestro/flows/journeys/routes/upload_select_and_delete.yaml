appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
---
- runFlow:
    file: ../../reusable/open_own_profile.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- tapOn:
    id: "my-routes"
- extendedWaitUntil:
    visible:
      id: "routes-list-screen"
    timeout: 10000
- assertVisible:
    id: "routes-list-content"
- tapOn:
    id: "routes-list-upload-button"
    optional: true
- tapOn:
    id: "routes-list-fab-upload-button"
    optional: true
- extendedWaitUntil:
    visible:
      id: "route-upload-screen"
    timeout: 10000
- assertVisible:
    id: "route-upload-pick-file-button"
- assertVisible:
    id: "route-upload-name-input"
- assertVisible:
    id: "route-upload-submit-button"
- tapOn:
    id: "route-upload-cancel-button"
- extendedWaitUntil:
    visible:
      id: "routes-list-screen"
    timeout: 10000
