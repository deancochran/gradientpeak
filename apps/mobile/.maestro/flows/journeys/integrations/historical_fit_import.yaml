appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
---
- runFlow:
    file: ../../reusable/open_own_profile.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- tapOn:
    id: "integrations"
- extendedWaitUntil:
    visible:
      id: "integrations-screen"
    timeout: 10000
- assertVisible:
    id: "integrations-pick-fit-file-button"
- assertVisible:
    id: "integrations-historical-name-input"
- assertVisible:
    id: "integrations-historical-notes-input"
- assertVisible:
    id: "integrations-import-fit-button"
