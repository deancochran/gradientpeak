appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
---
- runFlow:
    file: ../../reusable/open_own_profile.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- tapOn:
    id: "my-activities"
- extendedWaitUntil:
    visible:
      id: "activities-list-screen"
    timeout: 10000
- tapOn:
    id: "activities-list-import-trigger"
- extendedWaitUntil:
    visible:
      id: "activity-import-screen"
    timeout: 10000
- assertVisible:
    id: "activity-import-pick-fit-file-button"
- assertVisible:
    id: "activity-import-name-input"
- assertVisible:
    id: "activity-import-notes-input"
- assertVisible:
    id: "activity-import-submit-button"
