appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- runFlow:
    file: ../../reusable/open_plan_tab.yaml
- tapOn:
    id: "projection-settings-button"
- extendedWaitUntil:
    visible:
      id: "training-preferences-screen"
    timeout: 10000
- assertVisible:
    id: "training-preferences-tab-schedule"
- assertVisible:
    id: "training-preferences-save-button"
