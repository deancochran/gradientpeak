appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  TARGET_USERNAME: "coachcasey"
  TARGET_USER_ID: "coachcasey"
---
- runFlow:
    file: ../../reusable/open_profile_screen.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
      TARGET_USERNAME: "${TARGET_USERNAME}"
      TARGET_USER_ID: "${TARGET_USER_ID}"
- tapOn:
    id: "sign-out"
- assertVisible:
    id: "user-detail-screen"
- tapOn:
    text: "Sign Out"
    optional: true
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000
