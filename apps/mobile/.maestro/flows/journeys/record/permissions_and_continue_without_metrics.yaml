appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  REQUIRED_METRICS_PLAN_NAME: "ERG Builder"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- runFlow:
    file: ../../reusable/open_record_tab.yaml
- tapOn:
    id: "activity-select-run"
- extendedWaitUntil:
    visible:
      id: "record-screen-ready"
    timeout: 10000
- tapOn:
    id: "record-plan-summary-button"
- extendedWaitUntil:
    visible:
      id: "record-plan-screen"
    timeout: 10000
- tapOn:
    id: "record-plan-search-input"
- inputText: "${REQUIRED_METRICS_PLAN_NAME}"
- tapOn:
    text: "${REQUIRED_METRICS_PLAN_NAME}"
- extendedWaitUntil:
    visible:
      id: "recording-start-button"
    timeout: 10000
- tapOn:
    id: "recording-start-button"
- assertVisible: "Profile Setup Required"
- assertVisible: "Continue Anyway"
- tapOn: "Continue Anyway"
- extendedWaitUntil:
    visible:
      id: "recording-pause-button"
    timeout: 10000
