appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  SHARED_ROUTE_NAME: "River Loop"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- runFlow:
    file: ../../reusable/open_record_tab.yaml
- tapOn:
    id: "activity-select-run"
- extendedWaitUntil:
    visible:
      id: "record-screen-ready"
    timeout: 10000
- tapOn:
    id: "record-route-summary-button"
- extendedWaitUntil:
    visible:
      id: "record-route-screen"
    timeout: 10000
- tapOn:
    id: "record-route-search-input"
- inputText: "${SHARED_ROUTE_NAME}"
- tapOn:
    text: "${SHARED_ROUTE_NAME}"
- extendedWaitUntil:
    visible:
      id: "route-preview-screen"
    timeout: 10000
- assertVisible:
    id: "route-preview-attach-button"
- tapOn:
    id: "route-preview-attach-button"
- extendedWaitUntil:
    visible:
      id: "record-screen-ready"
    timeout: 10000
- assertVisible:
    id: "recording-start-button"
