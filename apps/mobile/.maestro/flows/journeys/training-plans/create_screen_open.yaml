appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
---
- runFlow:
    file: ../../reusable/open_own_profile.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- tapOn:
    id: "my-training-plans"
- extendedWaitUntil:
    visible:
      id: "training-plans-list-screen"
    timeout: 10000
- tapOn:
    id: "training-plans-list-create-button"
- extendedWaitUntil:
    visible:
      id: "training-plan-composer-screen"
    timeout: 10000
- assertVisible:
    id: "training-plan-name-input"
- tapOn:
    id: "training-plan-name-input"
- inputText: "Maestro Draft Plan"
- tapOn:
    id: "training-plan-tab-goals"
- assertVisible:
    id: "training-plan-tab-review"
- tapOn:
    id: "training-plan-tab-review"
- assertVisible:
    id: "training-plan-save-button"
