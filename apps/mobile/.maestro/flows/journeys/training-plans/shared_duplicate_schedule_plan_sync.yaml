appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  SHARED_TRAINING_PLAN_NAME: "10K Builder"
  PLAN_ANCHOR_DATE: "2026-03-30"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- runFlow:
    file: ../../reusable/open_discover_tab.yaml
- tapOn: "Training Plans"
- tapOn: "Search training plans"
- inputText: "${SHARED_TRAINING_PLAN_NAME}"
- extendedWaitUntil:
    visible: "${SHARED_TRAINING_PLAN_NAME}"
    timeout: 10000
- tapOn: "${SHARED_TRAINING_PLAN_NAME}"
- extendedWaitUntil:
    visible:
      id: "training-plan-schedule-button"
    timeout: 10000
- tapOn:
    id: "training-plan-duplicate-button"
    optional: true
- tapOn:
    id: "training-plan-schedule-button"
- extendedWaitUntil:
    visible:
      id: "apply-template-anchor-date"
    timeout: 10000
- tapOn:
    id: "training-plan-anchor-start"
- tapOn:
    id: "apply-template-anchor-date"
- inputText: "${PLAN_ANCHOR_DATE}"
- tapOn:
    id: "training-plan-schedule-confirm"
- runFlow:
    file: ../../reusable/open_plan_tab.yaml
- assertVisible:
    id: "plan-current-plan-card"
- assertVisible: "${SHARED_TRAINING_PLAN_NAME}"
- runFlow:
    file: ../../reusable/open_calendar_tab.yaml
- assertVisible:
    id: "day-header-${PLAN_ANCHOR_DATE}"
