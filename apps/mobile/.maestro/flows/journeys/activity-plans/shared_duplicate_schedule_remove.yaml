appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  SHARED_ACTIVITY_PLAN_NAME: "Tempo Builder"
---
- runFlow:
    file: ../../reusable/authenticated_home.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
- runFlow:
    file: ../../reusable/open_discover_tab.yaml
- tapOn: "Activity Plans"
- tapOn: "Search activity plans"
- inputText: "${SHARED_ACTIVITY_PLAN_NAME}"
- extendedWaitUntil:
    visible: "${SHARED_ACTIVITY_PLAN_NAME}"
    timeout: 10000
- tapOn: "${SHARED_ACTIVITY_PLAN_NAME}"
- extendedWaitUntil:
    visible:
      id: "activity-plan-duplicate-button"
    timeout: 10000
- tapOn:
    id: "activity-plan-duplicate-button"
- tapOn:
    id: "activity-plan-schedule-button"
- extendedWaitUntil:
    visible:
      id: "schedule-modal"
    timeout: 10000
- tapOn:
    id: "schedule-submit-button"
- extendedWaitUntil:
    visible:
      id: "activity-plan-remove-schedule-button"
    timeout: 10000
- runFlow:
    file: ../../reusable/open_calendar_tab.yaml
- assertVisible: "${SHARED_ACTIVITY_PLAN_NAME}"
- tapOn: "${SHARED_ACTIVITY_PLAN_NAME}"
- extendedWaitUntil:
    visible:
      id: "event-detail-open-linked-plan-button"
    timeout: 10000
- tapOn:
    id: "event-detail-open-linked-plan-button"
- extendedWaitUntil:
    visible:
      id: "activity-plan-remove-schedule-button"
    timeout: 10000
- tapOn:
    id: "activity-plan-remove-schedule-button"
- tapOn:
    text: "Remove Schedule"
    optional: true
