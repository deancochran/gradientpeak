appId: com.deancochran.gradientpeak.dev
env:
  STANDARD_USER_EMAIL: "test@example.com"
  STANDARD_USER_PASS: "password123"
  TARGET_USERNAME: "coachcasey"
  TARGET_USER_ID: "coachcasey"
  ACTIVITY_COMMENT_TEXT: "Great session from Maestro"
---
- runFlow:
    file: ../activities/detail_open.yaml
    env:
      STANDARD_USER_EMAIL: "${STANDARD_USER_EMAIL}"
      STANDARD_USER_PASS: "${STANDARD_USER_PASS}"
      TARGET_USERNAME: "${TARGET_USERNAME}"
      TARGET_USER_ID: "${TARGET_USER_ID}"
- tapOn:
    id: "activity-detail-like-button"
    optional: true
- tapOn:
    id: "activity-detail-comment-input"
- inputText: "${ACTIVITY_COMMENT_TEXT}"
- tapOn:
    id: "activity-detail-comment-submit"
- assertVisible:
    text: "${ACTIVITY_COMMENT_TEXT}"
    optional: true
