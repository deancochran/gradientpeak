name: SDLC work item
description: Capture a feature, bug, maintenance task, or agent-ready work item.
title: "[Work]: "
labels:
  - status:intake
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should change?
      placeholder: Describe the desired change or problem.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: Why does this matter for users or the product?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this to be done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: checkboxes
    id: affected-areas
    attributes:
      label: Affected areas
      options:
        - label: web
        - label: mobile
        - label: api
        - label: db
        - label: core
        - label: ui
        - label: auth
        - label: infra/workflows
        - label: docs
        - label: tests
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and notes
      description: Known limits, UX requirements, compatibility, or sequencing constraints.
  - type: textarea
    id: verification
    attributes:
      label: Verification expectation
      description: Which checks, tests, screenshots, or manual verification should prove this is done?
      placeholder: pnpm check-types, pnpm test, focused tests, screenshots, etc.
