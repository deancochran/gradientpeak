name: OpenCode PR review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: opencode-review-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: read
  issues: write

jobs:
  review:
    name: Review pull request
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run OpenCode PR review
        id: opencode_review
        continue-on-error: true
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai/gpt-5.5
          agent: plan
          use_github_token: true
          prompt: |
            Review this GradientPeak pull request as a read-only SDLC reviewer.

            Enforce:
            - package boundaries and validation rules from AGENTS.md
            - Plane identifier traceability in branch names, PR titles/bodies, and verification notes
            - smallest-correct-change discipline
            - no unrelated refactors
            - no secrets or credentials
            - tests for behavior changes
            - schema/auth/workflow/deploy changes require explicit human approval

            Comment only when there is actionable feedback, an unresolved risk, or a missing verification step.

      - name: Explain advisory review fallback
        if: steps.opencode_review.outcome == 'failure'
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          OpenCode PR review could not post its review comment or reaction with
          the current GitHub token permissions. Treat this check as advisory;
          required validation remains covered by the Validate and CI workflows.
          EOF
          echo "::warning::OpenCode PR review is advisory until GitHub token comment permissions are available."
