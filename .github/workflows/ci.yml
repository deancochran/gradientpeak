name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and lint rules
        run: pnpm check:ci

      - name: Check types
        run: pnpm check-types

      - name: Run tests
        run: pnpm test
