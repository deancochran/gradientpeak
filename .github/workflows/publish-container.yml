name: Publish container image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "apps/web/**"
      - "packages/auth/**"
      - "packages/core/**"
      - "packages/api/**"
      - "packages/db/**"
      - "packages/ui/**"
      - "tooling/**"
      - "package.json"
      - "turbo.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/publish-container.yml"
  workflow_dispatch:
    inputs:
      push_image:
        description: Push the image to GHCR
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-and-push:
    name: Build, smoke, and publish web image
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Decide whether to push
        id: publish
        shell: bash
        run: |
          SHOULD_PUSH=true
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.push_image }}" == "false" ]]; then
            SHOULD_PUSH=false
          fi
          echo "push=${SHOULD_PUSH}" >> "${GITHUB_OUTPUT}"

      - name: Build image and load locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          load: true
          tags: gradientpeak-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container health endpoint
        shell: bash
        run: |
          docker run --rm -d --name gradientpeak-web-smoke -p 3000:3000 gradientpeak-web:ci
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /dev/null; then
              docker logs gradientpeak-web-smoke
              docker stop gradientpeak-web-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs gradientpeak-web-smoke || true
          docker stop gradientpeak-web-smoke || true
          exit 1

      - name: Log in to GHCR
        if: steps.publish.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.publish.outputs.push == 'true'
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        if: steps.publish.outputs.push == 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
