name: Validate

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format-and-lint:
    name: Format And Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome check
        run: pnpm check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type checks
        run: pnpm check-types

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run builds
        run: pnpm build

  unit-and-integration:
    name: Unit And Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit and integration tests
        run: pnpm test

  mobile-component-and-jest:
    name: Mobile Component And Jest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mobile Jest tests
        run: pnpm --filter mobile test:jest

  full-validation-suite:
    name: Full Validation Suite
    runs-on: ubuntu-latest
    needs:
      - format-and-lint
      - typecheck
      - build
      - unit-and-integration
      - mobile-component-and-jest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full validation suite
        run: pnpm check-types && pnpm lint && pnpm test

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    needs:
      - format-and-lint
      - typecheck
      - build
      - unit-and-integration
      - mobile-component-and-jest
      - full-validation-suite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: pnpm run self-host:up

      - name: Wait for Supabase
        run: bash ./scripts/wait-for-port.sh 127.0.0.1 54321 supabase 180

      - name: Export local test environment
        run: bash ./scripts/ci-export-local-env.sh >> "$GITHUB_ENV"

      - name: Seed E2E users
        run: node ./apps/mobile/scripts/seed-e2e-users.mjs

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start web E2E server
        run: nohup pnpm run dev:e2e:web > /tmp/gradientpeak-web-e2e.log 2>&1 &

      - name: Wait for web server
        run: bash ./scripts/wait-for-port.sh 127.0.0.1 3000 web-e2e 180

      - name: Run Playwright
        run: pnpm --filter web test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
            /tmp/gradientpeak-web-e2e.log
          if-no-files-found: ignore

  mobile-e2e-core:
    name: Mobile E2E
    runs-on: ubuntu-latest
    needs:
      - format-and-lint
      - typecheck
      - build
      - unit-and-integration
      - mobile-component-and-jest
      - full-validation-suite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: pnpm run self-host:up

      - name: Wait for Supabase
        run: bash ./scripts/wait-for-port.sh 127.0.0.1 54321 supabase 180

      - name: Export local test environment
        run: bash ./scripts/ci-export-local-env.sh >> "$GITHUB_ENV"

      - name: Seed E2E users
        run: node ./apps/mobile/scripts/seed-e2e-users.mjs

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Start E2E web server
        run: nohup pnpm run dev:e2e:web > /tmp/gradientpeak-web-e2e.log 2>&1 &

      - name: Start E2E Metro server
        run: nohup pnpm run dev:e2e:mobile > /tmp/gradientpeak-mobile-e2e.log 2>&1 &

      - name: Wait for E2E web server
        run: bash ./scripts/wait-for-port.sh 127.0.0.1 3000 web-e2e 180

      - name: Wait for E2E Metro server
        run: bash ./scripts/wait-for-port.sh 127.0.0.1 8081 metro-e2e 180

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro smoke flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86
          profile: pixel_7
          emulator-boot-timeout: 900
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: |
            pnpm --filter mobile android:install
            pnpm --filter mobile test:e2e:flow .maestro/flows/main/auth_navigation.yaml -- --device emulator-5554
            pnpm --filter mobile test:e2e:flow .maestro/flows/main/tabs_smoke.yaml -- --device emulator-5554

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-mobile-e2e
          path: |
            apps/mobile/.maestro/artifacts
            apps/mobile/.maestro/emulator.log
            /tmp/gradientpeak-web-e2e.log
            /tmp/gradientpeak-mobile-e2e.log
          if-no-files-found: ignore
