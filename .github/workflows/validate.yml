name: Validate

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BETTER_AUTH_SECRET: ci-build-secret-gradientpeak-2026-validate-32chars
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
  POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
  SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
  NEXT_PRIVATE_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PRIVATE_SUPABASE_SECRET_KEY: ci-build-service-role-key
  SUPABASE_SERVICE_ROLE_KEY: ci-build-service-role-key

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs == 'true' && steps.filter.outputs.non_docs != 'true' }}
      api_live_db_related: ${{ steps.filter.outputs.api_live_db_related }}
      db_schema_related: ${{ steps.filter.outputs.db_schema_related }}
      mobile_runtime_related: ${{ steps.filter.outputs.mobile_runtime_related }}
      web_related: ${{ steps.filter.outputs.web_related }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect docs-only changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - '**/*.md'
              - '**/*.mdx'
              - 'docs/**'
              - '.github/workflows/validate.yml'
            non_docs:
              - '**'
              - '!**/*.md'
              - '!**/*.mdx'
              - '!docs/**'
              - '!.github/workflows/validate.yml'
            mobile_runtime_related:
              - 'apps/mobile/**'
              - '!apps/mobile/.maestro/**'
              - 'packages/api/**'
              - 'packages/auth/**'
              - 'packages/core/**'
              - 'packages/db/**'
              - 'packages/tailwindcss/**'
              - 'packages/ui/**'
              - 'tooling/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            db_schema_related:
              - 'packages/db/**'
            api_live_db_related:
              - 'packages/api/**'
              - 'packages/db/**'
              - 'packages/db/supabase/**'
            web_related:
              - 'apps/web/**'
              - 'packages/api/**'
              - 'packages/auth/**'
              - 'packages/core/**'
              - 'packages/db/**'
              - 'packages/tailwindcss/**'
              - 'packages/ui/**'
              - 'tooling/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'

  docs-only:
    name: Docs Only
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.docs_only == 'true'

    steps:
      - name: Skip full validation for docs-only changes
        run: |
          printf 'Docs-only change detected; skipping full validation suite.\n'

  format-and-lint:
    name: Format And Lint
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome check
        run: pnpm check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type checks
        run: pnpm check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run builds
        run: pnpm build

  unit-and-integration:
    name: Unit And Integration
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit and integration tests
        run: pnpm test

  db-schema-parity:
    name: DB Schema Parity
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout
        if: needs.changes.outputs.db_schema_related == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: needs.changes.outputs.db_schema_related == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        if: needs.changes.outputs.db_schema_related == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: needs.changes.outputs.db_schema_related == 'true'
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        if: needs.changes.outputs.db_schema_related == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        if: needs.changes.outputs.db_schema_related == 'true'
        run: pnpm run self-host:up

      - name: Wait for Supabase
        if: needs.changes.outputs.db_schema_related == 'true'
        run: |
          for i in $(seq 1 180); do
            nc -z 127.0.0.1 54321 && exit 0
            sleep 1
          done
          echo "Timed out waiting for supabase on 127.0.0.1:54321" >&2
          exit 1

      - name: Apply local app schema migrations
        if: needs.changes.outputs.db_schema_related == 'true'
        run: pnpm --filter @repo/db db:migrate

      - name: Check schema parity
        if: needs.changes.outputs.db_schema_related == 'true'
        run: pnpm --filter @repo/db db:schema:check

      - name: Skip schema parity when DB schema is unchanged
        if: needs.changes.outputs.db_schema_related != 'true'
        run: |
          printf 'No packages/db changes detected; skipping schema parity check.\n'

  api-live-db:
    name: API Live DB Smoke
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout
        if: needs.changes.outputs.api_live_db_related == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: needs.changes.outputs.api_live_db_related == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        if: needs.changes.outputs.api_live_db_related == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: needs.changes.outputs.api_live_db_related == 'true'
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        if: needs.changes.outputs.api_live_db_related == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        if: needs.changes.outputs.api_live_db_related == 'true'
        run: pnpm run self-host:up

      - name: Wait for Supabase
        if: needs.changes.outputs.api_live_db_related == 'true'
        run: |
          for i in $(seq 1 180); do
            nc -z 127.0.0.1 54321 && exit 0
            sleep 1
          done
          echo "Timed out waiting for supabase on 127.0.0.1:54321" >&2
          exit 1

      - name: Apply local app schema migrations
        if: needs.changes.outputs.api_live_db_related == 'true'
        run: pnpm --filter @repo/db db:migrate

      - name: Run API live DB smoke tests
        if: needs.changes.outputs.api_live_db_related == 'true'
        run: pnpm --filter @repo/api test:live-db

      - name: Skip live DB smoke when API and DB are unchanged
        if: needs.changes.outputs.api_live_db_related != 'true'
        run: |
          printf 'No API or DB changes detected; skipping API live DB smoke tests.\n'

  mobile-component-and-jest:
    name: Mobile Component And Jest
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.mobile_runtime_related == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mobile Jest tests
        run: pnpm --filter mobile test:jest

  full-validation-suite:
    name: Full Validation Suite
    runs-on: ubuntu-latest
    needs:
      - changes
      - format-and-lint
      - typecheck
      - build
      - unit-and-integration
      - db-schema-parity
      - api-live-db
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Validation gate passed
        run: |
          printf 'All prerequisite validation jobs passed.\n'
