name: OpenCode issue triage

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  schedule:
    - cron: "17 13 * * 1-5"
  workflow_dispatch:

concurrency:
  group: opencode-triage-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: read

jobs:
  triage:
    name: Triage issue backlog
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run OpenCode triage
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai/gpt-5.5
          agent: plan
          use_github_token: true
          prompt: |
            Triage GradientPeak issues without editing product code.

            Goals:
            - normalize issue intent into request, why, acceptance criteria, constraints, and verification
            - propose lifecycle labels: status:intake, status:needs-clarification, status:ready, status:planned, status:in-progress, status:in-review, status:blocked, status:merged, status:released, status:closed
            - propose area/type/risk/agent labels, especially agent:needs-human for ambiguous or risky work
            - identify whether a spec is required
            - ask concise clarifying questions when the issue is not ready
            - avoid noisy comments when no action is needed

            Do not implement code. Do not close issues unless they are clearly duplicates and you link the canonical issue.
