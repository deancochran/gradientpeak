name: OpenCode PR steward

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  schedule:
    - cron: "7 15 * * 1-5"
  workflow_dispatch:

concurrency:
  group: opencode-pr-steward-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  steward:
    name: Steward PR health and conflicts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run OpenCode PR steward
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openai/gpt-5.5
          agent: build
          use_github_token: true
          prompt: |
            Steward open GradientPeak PRs conservatively.

            Goals:
            - diagnose failed CI and comment with concise next actions
            - identify stale branches or mechanical conflicts
            - fix only mechanical conflicts when the intent is obvious
            - never change product behavior to resolve a conflict
            - label or comment agent:needs-human when semantic judgment is required

            Escalate instead of editing when conflicts involve schema, auth, API contracts, workflow permissions, deploys, or cross-feature product decisions.
