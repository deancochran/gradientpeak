name: OpenCode maintenance sweep

on:
  schedule:
    - cron: "41 14 * * 1"
  workflow_dispatch:

concurrency:
  group: opencode-maintenance-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  maintenance:
    name: Run bounded maintenance sweep
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run OpenCode maintenance
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: openai/gpt-5.5
          agent: build
          prompt: |
            Perform a conservative, bounded GradientPeak maintenance sweep.

            You may:
            - inspect TODOs, stale docs, obvious low-risk lint/test issues, and missing issue links
            - open issues for larger work
            - open a PR only for small, isolated, low-risk fixes

            You must not:
            - change database schema or migrations
            - change auth/security behavior
            - modify GitHub workflow permissions
            - perform broad refactors
            - touch secrets or deployment credentials

            If a change is risky or ambiguous, create or update an issue with agent:needs-human instead of coding it.
