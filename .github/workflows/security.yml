name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Review dependency changes
        id: dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Explain dependency review fallback
        if: steps.dependency_review.outcome == 'failure'
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          Dependency review could not complete. This check is advisory until the
          repository Dependency graph is enabled for GitHub's dependency review
          action. PNPM audit and image scanning remain the enforced security
          coverage on main, scheduled runs, and manual workflow dispatch.
          EOF
          echo "::warning::Dependency review is advisory until repository Dependency graph support is enabled."

  audit:
    name: PNPM audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        id: audit
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: pnpm audit --audit-level high

      - name: Explain PR audit fallback
        if: github.event_name == 'pull_request' && steps.audit.outcome == 'failure'
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          PNPM audit found high-or-higher vulnerability findings. The audit is
          advisory on pull requests so existing dependency debt does not block
          unrelated changes, but it remains enforced on main, scheduled runs,
          and manual workflow dispatch.
          EOF
          echo "::warning::PNPM audit findings are advisory on pull requests and enforced outside pull_request events."

  docker-scan:
    name: Web image vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: gradientpeak-web:security
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gradientpeak-web:security
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
